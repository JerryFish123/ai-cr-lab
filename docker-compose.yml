services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-cr-lab:local
    ports:
      - "5001:5001"
      - "5002:5002"
    volumes:
      - ./data:/app/data
      - ./log:/app/log
      - ./conf/.env:/app/conf/.env:ro
    env_file:
      - ./conf/.env
    restart: unless-stopped
