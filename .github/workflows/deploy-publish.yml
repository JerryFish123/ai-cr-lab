# 推送到 publish → SSH 到 ECS → 写入 Secrets 中的 .env → 重建服务
# GitHub Secrets（Repository secrets）:
#   ECS_HOST / ECS_USER / ECS_SSH_KEY  — 部署通道
#   APP_ENV_FILE                       — 完整 conf/.env 文件内容（多行）
#                                        须含 GIT_CLONE_MIRROR_PREFIX 等关键键，否则部署失败
name: Deploy publish → ECS

on:
  push:
    branches: [publish]
  workflow_dispatch:

concurrency:
  group: deploy-publish-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          command_timeout: 25m
          envs: APP_ENV_FILE
          script: |
            set -euo pipefail
            DEPLOY_PATH="/opt/ai-cr-lab"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "ERROR: $DEPLOY_PATH 尚未初始化。请先在 ECS 执行 scripts/deploy/ecs-bootstrap.sh"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            if [ -z "${APP_ENV_FILE:-}" ]; then
              echo "ERROR: GitHub Secret APP_ENV_FILE 为空"
              exit 1
            fi
            umask 077
            printf '%s\n' "$APP_ENV_FILE" > conf/.env
            chmod 600 conf/.env

            # Fail-fast: 关键配置缺失时不要带着坏 .env 继续构建
            missing=0
            for key in \
              LLM_PROVIDER \
              GITHUB_ACCESS_TOKEN \
              REVIEW_STRATEGY \
              GIT_CLONE_MIRROR_PREFIX
            do
              if ! grep -qE "^${key}=.+" conf/.env; then
                echo "ERROR: conf/.env 缺少或为空: ${key}"
                echo "请更新 GitHub Secret APP_ENV_FILE 后重试"
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
            echo "[deploy] conf/.env critical keys OK"

            bash scripts/deploy/remote-update.sh
